name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Cargo build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cmake pkg-config libopus-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Build the release binary. This both verifies the workspace compiles and
      # produces a runnable, optimized `spoticord` binary. No cross-compilation.
      - name: Build release binary
        run: cargo build --release --bin spoticord

      # Make the compiled binary downloadable from the workflow run page.
      - name: Upload spoticord binary
        uses: actions/upload-artifact@v4
        with:
          name: spoticord-linux-x86_64
          path: target/release/spoticord
          if-no-files-found: error
