name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: Cargo build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libpq-dev cmake pkg-config libopus-dev

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Compile-only check that the workspace builds (verifies the songbird 0.6.0
      # upgrade). No registry push, no cross-compilation.
      - name: Build workspace
        run: cargo build --workspace
